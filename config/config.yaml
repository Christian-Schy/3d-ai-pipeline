# config/config.yaml — Central configuration for the 3D-AI-Pipeline
#
# Rule: no magic numbers or model names anywhere in code.
# Everything that might change lives here.

# --- Ollama ---
ollama:
  base_url: "http://localhost:11434"
  timeout_seconds: 120
  # Global defaults for every agent call:
  think: true        # qwen3/qwen3.5: false = skip chain-of-thought → viel schneller für JSON
  temperature: 0.15   # 0.0–1.0 | niedrig = deterministischer JSON, hoch = kreativer
  num_ctx: 8192       # Kontextfenster in Tokens (Standard 2048 ist oft zu wenig)

# Per-Agent Overrides — nur abweichende Werte eintragen, Rest kommt von ollama-Defaults
# Verfügbare Felder: think (true/false), temperature (0.0–1.0), num_ctx (int)
agent_options:
  blueprint_architect:
    think: true       # Legacy / modification path; größeres Kontextfenster für Edge-Cases
    temperature: 0.1
    num_ctx: 12288
  coder:
    think: false      # qwen3-coder unterstützt 'think' nicht → weglassen
    temperature: 0.05 # Code soll sehr deterministisch sein
    num_ctx: 16384    # Coder braucht Blueprint + Code History im Kontext
  interpreter:
    think: false
    temperature: 0.1  # Etwas Spielraum für natürliche Sprache, aber deterministisch
    num_ctx: 8192
  plan_validator:
    think: false
    temperature: 0.1
    num_ctx: 8192
  punctuation:
    think: false       # Triviale Aufgabe — kein Reasoning noetig
    temperature: 0.0   # Strikt deterministisch, nur Kommas einfuegen
    num_ctx: 4096
  position_extractor:
    think: false       # Labeler — reine Satz-Klassifikation, kein Reasoning noetig
    temperature: 0.05  # Sehr deterministisch, Originalwortlaut beibehalten
    num_ctx: 4096      # Per-Teil-Text + Demos passen locker rein
  platzierer:
    think: false       # Wenige Demos + klare Checkliste reichen, Think macht 26B sehr langsam
    temperature: 0.1   # Etwas Spielraum fuer Anker/Versatz-Disambiguierung
    num_ctx: 6144
  aktions_klassifizierer:
    think: false       # Triviale Klassifikation in 5 Typen — kein Reasoning noetig
    temperature: 0.0   # Strikt deterministisch, eindeutige Ausgabe
    num_ctx: 4096      # Eine Phrase + Few-Shots passen locker rein
  normalizer:
    think: false       # Klassifizierer hat typ/seite/parameter_hints schon
    temperature: 0.05  # geliefert — Aufgabe ist nur noch position/richtung
    num_ctx: 6144      # extrahieren. Reasoning macht das langsam ohne Mehrwert.

# --- Model routing ---
# Each agent uses the model best suited for its task.
# Adjust these to match your 'ollama list' output.
models:
  # Entry / Modification
  interpreter:              "qwen3.5:9b"
  modification_interpreter: "qwen3.5:9b"
  visioner:                 "qwen3.5:35b"
  punctuation:              "gemma4:26b"   # Komma-Setzer (Voice-Eingabe)

  # Blueprint Chain (3-Step + Multi-Part split)
  inventar:                 "gemma4:26b"   # Stueckliste + Aktionen
  aktions_klassifizierer:   "gemma4:26b"   # Pro-Aktion-Klassifikation (ADR 0003)
  position_extractor:       "gemma4:26b"   # Pre-digester pro Kind-Teil (Multi-Part)
  text_splitter:            "gemma4:26b"   # Spec → Text pro Teil (Multi-Part)
  normalizer:               "gemma4:26b"   # Feature-Normalisierung (in feature_definierer)
  platzierer:               "gemma4:26b"   # Teil-Platzierung (Anker, Rotation)
  assembly:                 "gemma4:26b"   # Vollständiges Blueprint zusammensetzen

  # Validation + Codegen
  plan_validator:           "gemma4:26b"
  coder:                    "nemotron-cascade-2:30b"
  validator:                "gemma4:26b"
  code_fixer:               "qwen3.5:9b"

  # Legacy fallback path (Modification + Error-Loop)
  blueprint_architect:      "nemotron-cascade-2:30b"

# --- RAG ---
rag:
  embedding_model: "all-MiniLM-L6-v2"
  db_path: "data/rag_db"
  n_results:
    blueprint_architect: 4
    coder:               4
    validator:           3
    interpreter:         2
    visioner:            2
    plan_validator:      2
    code_review:         2
  knowledge:
    coder:       "data/knowledge/rag"
    validator:   "data/knowledge/rag_agents/22_plan_validation"
    interpreter: "data/knowledge/rag/16_interpreter_knowledge"
    visioner:    "data/knowledge/rag"

# --- Sandbox ---
sandbox:
  timeout_seconds: 60
  output_dir: "data/output"

# --- Error loop ---
error_loop:
  max_attempts: 6
  max_semantic_retries: 3
  # Coder-Elimination (Memory project_coder_elimination): true → alle Coder-
  # Routes (placement-error im Validator, phase=1 im Error-Router, llm-mode
  # im function_decomposer) gehen auf END. Run wird trotzdem gespeichert.
  disable_coder: true

# --- UI ---
ui:
  server_host: "0.0.0.0"
  server_port: 7860
  share: false
  log_lines_visible: 50

plan_validator:
  max_retries: 2
